services:
    identity-db:
        image: postgres:16-alpine
        container_name: identity-db
        environment:
            POSTGRES_USER: ${POSTGRES_USER}
            POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
            POSTGRES_DB: JiraLiteIdentityDb
        ports:
            - "5432:5432"
        volumes:
            - identity_postgres_data:/var/lib/postgresql/data
        healthcheck:
            test:
                [
                    "CMD-SHELL",
                    "pg_isready -U ${POSTGRES_USER} -d JiraLiteIdentityDb",
                ]
            interval: 10s
            timeout: 5s
            retries: 5

    tracking-db:
        image: postgres:16-alpine
        container_name: tracking-db
        environment:
            POSTGRES_USER: ${POSTGRES_USER}
            POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
            POSTGRES_DB: JiraLiteTrackingDb
        ports:
            - "5433:5432"
        volumes:
            - tracking_postgres_data:/var/lib/postgresql/data
        healthcheck:
            test:
                [
                    "CMD-SHELL",
                    "pg_isready -U ${POSTGRES_USER} -d JiraLiteTrackingDb",
                ]
            interval: 10s
            timeout: 5s
            retries: 5

    logging-db:
        image: postgres:16-alpine
        container_name: logging-db
        environment:
            POSTGRES_USER: ${POSTGRES_USER}
            POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
            POSTGRES_DB: JiraLiteLoggingDb
        ports:
            - "5434:5432"
        volumes:
            - logging_postgres_data:/var/lib/postgresql/data
        healthcheck:
            test:
                [
                    "CMD-SHELL",
                    "pg_isready -U ${POSTGRES_USER} -d JiraLiteLoggingDb",
                ]
            interval: 10s
            timeout: 5s
            retries: 5

    comment-db:
        image: postgres:16-alpine
        container_name: comment-db
        environment:
            POSTGRES_USER: ${POSTGRES_USER}
            POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
            POSTGRES_DB: JiraLiteCommentDb
        ports:
            - "5435:5432"
        volumes:
            - comment_postgres_data:/var/lib/postgresql/data
        healthcheck:
            test:
                [
                    "CMD-SHELL",
                    "pg_isready -U ${POSTGRES_USER} -d JiraLiteCommentDb",
                ]
            interval: 10s
            timeout: 5s
            retries: 5

    rabbitmq:
        image: rabbitmq:3-management-alpine
        container_name: rabbitmq
        environment:
            RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER}
            RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD}
        ports:
            - "5672:5672"
            - "15672:15672"
        volumes:
            - rabbitmq_data:/var/lib/rabbitmq
        healthcheck:
            test:
                [
                    "CMD-SHELL",
                    "rabbitmq-diagnostics -q check_running && rabbitmq-diagnostics -q check_local_alarms",
                ]
            interval: 10s
            timeout: 10s
            retries: 10
            start_period: 30s

    logging-api:
        build:
            context: .
            dockerfile: src/Services/Logging/Logging.API/Dockerfile
        container_name: logging-api
        environment:
            ASPNETCORE_ENVIRONMENT: Production
            ASPNETCORE_URLS: http://+:8080
            ConnectionStrings__LoggingDb: Host=logging-db;Port=5432;Database=JiraLiteLoggingDb;Username=${POSTGRES_USER};Password=${POSTGRES_PASSWORD}
            RabbitMQ__Host: rabbitmq
            RabbitMQ__Username: ${RABBITMQ_USER}
            RabbitMQ__Password: ${RABBITMQ_PASSWORD}
            Jwt__Issuer: ${JWT_ISSUER}
            Jwt__Audience: ${JWT_AUDIENCE}
            Jwt__Secret: ${JWT_SECRET}
        ports:
            - "5003:8080"
        depends_on:
            logging-db:
                condition: service_healthy
            rabbitmq:
                condition: service_healthy
        restart: unless-stopped

    gateway:
        build:
            context: .
            dockerfile: src/ApiGateway/JiraLite.Gateway/Dockerfile
        container_name: gateway
        environment:
            ASPNETCORE_ENVIRONMENT: Production
            ASPNETCORE_URLS: http://+:8080
        ports:
            - "5000:8080"
        depends_on:
            - logging-api
        restart: unless-stopped

volumes:
    identity_postgres_data:
    tracking_postgres_data:
    logging_postgres_data:
    comment_postgres_data:
    rabbitmq_data:
